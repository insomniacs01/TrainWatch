services:
  train-watch:
    build:
      context: .
      dockerfile: Dockerfile
    image: train-watch:local
    container_name: train-watch
    restart: unless-stopped
    ports:
      - "${TRAIN_WATCH_PORT:-8420}:8420"
    environment:
      TRAIN_WATCH_PORT: "8420"
    volumes:
      - ./data:/app/data
      - ${HOME}/.ssh:/root/.ssh:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8420/').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
